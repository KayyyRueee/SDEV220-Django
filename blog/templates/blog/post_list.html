<!DOCTYPE html>
<html>
    <head>
        <title>My Blog</title>
    </head>
    <body>
        <header>
            <h1><a href="/">My Blog</a></h1>
        </header>

        {% for post in posts %}
            <article>
                <h2>{{ post.title }}</h2>
                <p>{{ post.text }}</p>
            </article>
        {% endfor %}
    </body>
</html>
